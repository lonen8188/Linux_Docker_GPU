{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <h2 class="fw-bold">AI 객체 탐지 분석</h2>
    <form action="/ai-detect/write" method="post" enctype="multipart/form-data" class="mt-4 p-4 border rounded shadow-sm">
        <div class="mb-3">
            <label class="form-label">제목</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">이미지 업로드</label>
            <input type="file" name="image" class="form-control" accept="image/*" onchange="previewImage(this)">
            <img id="preview" src="#" class="mt-3 img-fluid d-none" style="max-height: 300px;">
        </div>
        <div class="mb-3">
            <label class="form-label">설명</label>
            <textarea name="content" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-success w-100">분석 시작하기</button>
    </form>
</div>

<script>
function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('preview').src = e.target.result;
            document.getElementById('preview').classList.remove('d-none');
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
