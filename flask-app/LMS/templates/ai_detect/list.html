{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">내 AI 객체 탐지 목록</h2>
        <a href="/ai-detect/write" class="btn btn-primary">새 분석 시작</a>
    </div>

    <div class="row">
        {% for post in posts %}
            <div class="col-md-4 mb-4">
                <a href="/ai-detect/view/{{ post.id }}" class="text-decoration-none text-dark">
                    <div class="card h-100 shadow-sm card-hover">
                        {% set path_parts = post.image_path.split('/') %}
                        <img src="/uploads/{{ path_parts[0] }}/box_{{ path_parts[1] }}"
                             class="card-img-top" style="height: 200px; object-fit: cover;"
                             onerror="this.src='/uploads/{{ post.image_path }}'">

                        <div class="card-body">
                            <h5 class="card-title fw-bold">{{ post.title }}</h5>
                            <p class="card-text text-muted small">{{ post.content[:50] }}...</p>
                            <div class="mt-2">
                                {% for tag in post.detect_result | from_json %}
                                    <span class="badge bg-info text-dark">{{ tag }}</span>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}

            <style>
                .card-hover:hover {
                    transform: translateY(-5px);
                    transition: 0.3s;
                    box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
                }
            </style>
    </div>
</div>
{% endblock %}
